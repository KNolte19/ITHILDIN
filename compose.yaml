services:
  ithildin-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ithildin_wing_analysis
    ports:
      - 127.0.0.1:8080:8080
    volumes:
      - ./static/requests:/app/static/requests
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-CHANGEME-INSECURE-DEFAULT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
